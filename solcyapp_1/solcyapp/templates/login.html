<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — SolCy</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#080b12;--surface:#0f1420;--border:#1e2535;--accent:#e63946;--text:#e8eaf0;--muted:#6b7280;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;}
.logo{font-family:'Space Mono',monospace;font-size:1rem;font-weight:700;color:var(--accent);text-decoration:none;display:block;margin-bottom:2rem;}
.logo span{color:var(--text);}
h1{font-size:1.6rem;font-weight:800;margin-bottom:0.5rem;}
.sub{color:var(--muted);font-size:0.9rem;margin-bottom:2rem;}
.form-group{margin-bottom:1.25rem;}
label{display:block;font-size:0.8rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;}
input{width:100%;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:8px;padding:0.75rem 1rem;color:var(--text);font-family:'Syne',sans-serif;font-size:0.95rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--accent);}
.btn{width:100%;padding:0.85rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:'Syne',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:0.5rem;}
.btn:hover{background:#c1121f;}
.link-row{text-align:center;margin-top:1.5rem;font-size:0.875rem;color:var(--muted);}
.link-row a{color:var(--accent);text-decoration:none;font-weight:600;}
.flash{padding:0.75rem 1rem;border-radius:8px;margin-bottom:1.25rem;font-size:0.875rem;}
.flash.error{background:rgba(230,57,70,0.12);border:1px solid rgba(230,57,70,0.3);color:#e63946;}
.flash.success{background:rgba(46,204,113,0.12);border:1px solid rgba(46,204,113,0.3);color:#2ecc71;}
</style>
</head>
<body>
<div class="card">
  <a class="logo" href="/">SOL<span>CY</span></a>
  <h1>Welcome back</h1>
  <p class="sub">Sign in to your account to continue scanning.</p>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash {{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
  <form method="POST">
    <div class="form-group">
      <label>Email</label>
      <input type="email" name="email" required placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" required placeholder="••••••••">
    </div>
    <button type="submit" class="btn">Sign In</button>
  </form>
  <div class="link-row">Don't have an account? <a href="/register">Create one free</a></div>
</div>
</body>
</html>
